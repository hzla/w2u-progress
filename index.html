<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>White2Expansion Tracker</title>
    <link rel="stylesheet" href="styles.css?v=20260605">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">White2Upgrade</p>
          <h1>Gen 6 Expansion Tracker</h1>
        </div>
        <div class="toolbar" aria-label="Downloads">
          <a class="tool-button download" href="downloads/White2Upgrade.xdelta" download>Download Patch</a>
          <a class="tool-button download" href="downloads/demosave.dsv" download>Download Save File</a>
        </div>
      </header>

      <main>
        <section class="summary-strip" aria-label="Progress overview">
          <div class="summary-item">
            <span class="summary-label">Rows</span>
            <strong id="summary-rows">0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Checked</span>
            <strong id="summary-checked">0 / 0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Verified</span>
            <strong id="summary-verified">0</strong>
          </div>
          <div class="summary-item wide">
            <span class="summary-label">Saved</span>
            <strong id="summary-saved">Not yet</strong>
          </div>
        </section>

        <nav class="tabs" aria-label="Tracker categories">
          <button class="tab is-active" type="button" data-tab="pokemon">Pokemon</button>
          <button class="tab" type="button" data-tab="moves">Moves</button>
          <button class="tab" type="button" data-tab="items">Items</button>
          <button class="tab" type="button" data-tab="abilities">Abilities</button>
        </nav>

        <section class="controls" aria-label="Tracker filters">
          <label class="search-wrap">
            <span>Search</span>
            <input id="search-input" type="search" placeholder="Name, constant, description">
          </label>
          <div class="segmented" role="group" aria-label="Status filter">
            <button class="segment is-active" type="button" data-filter="all">All</button>
            <button class="segment" type="button" data-filter="open">Open</button>
            <button class="segment" type="button" data-filter="missingSprites" data-filter-category="pokemon">Missing art</button>
            <button class="segment" type="button" data-filter="missingAnimation" data-filter-category="moves" hidden>Missing animation</button>
            <button class="segment" type="button" data-filter="verified">Verified</button>
          </div>
        </section>

        <section class="tracker-panel" aria-live="polite">
          <div class="table-scroll">
            <table id="tracker-table">
              <thead id="tracker-head"></thead>
              <tbody id="tracker-body"></tbody>
            </table>
          </div>
          <p id="empty-state" class="empty-state" hidden>No matching rows.</p>
        </section>
      </main>
    </div>

    <template id="checkbox-template">
      <label class="check-cell">
        <input type="checkbox">
        <span></span>
      </label>
    </template>

    <script src="app.js?v=20260611-filter-counts" defer></script>
  </body>
</html>
